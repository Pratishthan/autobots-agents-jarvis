# ABOUTME: Docker Compose configuration for monorepo local development builds.
# ABOUTME: Uses Dockerfile.monorepo with build context at the monorepo root (..)
# ABOUTME: so that the local path dependency on autobots-devtools-shared-lib resolves correctly.
#
# Usage (from autobots-agents-jarvis/):
#   docker compose -f docker-compose.monorepo.yml up -d
#   docker compose -f docker-compose.monorepo.yml up -d --build
#   make docker-up-monorepo

# Common environment variables shared across all domain services
x-common-env: &common-env
  LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
  LLM_MODEL: ${LLM_MODEL:-gemini-2.0-flash}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY}
  ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
  LANGFUSE_HOST: ${LANGFUSE_HOST:-http://host.docker.internal:3000}
  LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-true}
  OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
  OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-}
  CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:-}
  DEBUG: ${DEBUG:-false}
  JARVIS_DATABASE_URL: ${JARVIS_DATABASE_URL:-}
  REDIS_URL: ${REDIS_URL:-}

services:
  concierge-chat:
    build:
      context: ..
      dockerfile: autobots-agents-jarvis/Dockerfile.monorepo
      args:
        DOMAIN: concierge
        PORT: 1337
    ports:
      - "1337:1337"
    environment:
      <<: *common-env
      DYNAGENT_CONFIG_ROOT_DIR: /app/agent_configs/concierge
      PORT: 2337
    volumes:
      - ./agent_configs:/app/agent_configs:ro,z
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:2337/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  customer-support-chat:
    build:
      context: ..
      dockerfile: autobots-agents-jarvis/Dockerfile.monorepo
      args:
        DOMAIN: customer_support
        PORT: 1338
    ports:
      - "1338:1338"
    environment:
      <<: *common-env
      DYNAGENT_CONFIG_ROOT_DIR: /app/agent_configs/customer-support
      PORT: 1338
    volumes:
      - ./agent_configs:/app/agent_configs:ro,z
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:1338/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  sales-chat:
    build:
      context: ..
      dockerfile: autobots-agents-jarvis/Dockerfile.monorepo
      args:
        DOMAIN: sales
        PORT: 1339
    ports:
      - "1339:1339"
    environment:
      <<: *common-env
      DYNAGENT_CONFIG_ROOT_DIR: /app/agent_configs/sales
      PORT: 1339
    volumes:
      - ./agent_configs:/app/agent_configs:ro,z
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:1339/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
